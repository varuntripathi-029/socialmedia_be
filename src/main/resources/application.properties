server.port=${PORT:8080}

# -------------------------
# PostgreSQL Database Config
# -------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari connection pool (recommended)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# -------------------------
# JPA / Hibernate Config
# -------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# -------------------------
# Logging (use DEBUG only locally)
# -------------------------
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# -------------------------
# CORS Configuration
# -------------------------
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://socialmedia-fe-beta.vercel.app}

# -------------------------
# JWT Configuration
# -------------------------
jwt.secret=${JWT_SECRET}
jwt.expiration=2592000000

# -------------------------
# File Upload Config
# -------------------------
# Railway exposes the attached volume mount path via RAILWAY_VOLUME_MOUNT_PATH.
# Mount the volume to /app/uploads in Railway, and local dev will still fall back to ./uploads.
file.upload-dir=${RAILWAY_VOLUME_MOUNT_PATH:${FILE_UPLOAD_DIR:uploads}}

# -------------------------
# Google OAuth Configuration
# -------------------------
google.client.id=${GOOGLE_CLIENT_ID}
google.client.secret=${GOOGLE_CLIENT_SECRET}

spring.datasource.hikari.connection-timeout=30000
